<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Visiaxx — 12 clinical-grade eye tests from your couch. Digital eye care reimagined.">
  <meta name="keywords" content="eye care, vision test, eye test online, digital eye care, visiaxx">

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Visiaxx">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Visiaxx — Vision Care, Reimagined</title>
  <link rel="manifest" href="manifest.json">

  <!-- Preconnect and Preload Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=DM+Sans:wght@400;500;700&display=block" rel="stylesheet">

  <style>
    /* Browser-native preloading to eliminate initial flicker */
    .font-preload { position: absolute; visibility: hidden; opacity: 0; pointer-events: none; }
    .syne-preload { font-family: 'Syne'; font-weight: 800; }

    body {
      margin: 0;
      padding: 0;
      background-color: #0A0F1E;
      overflow: hidden;
    }

    /* ═══════════════════════════════════════════════════════
       PREMIUM EYE LOADER — SVG animated eye matching the
       app's EyeLoader CustomPainter exactly:
       - Almond-shaped sclera (quadratic bezier)
       - Iris look-around (4s cycle)
       - Pupil breathing pulse
       - Periodic blinks (scaleY at 20%, 50%, 80%)
       - Reflections & glow stroke
       ═══════════════════════════════════════════════════════ */
    .loading-screen {
      position: fixed;
      inset: 0;
      z-index: 999999;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: linear-gradient(180deg, #0A0F1E 0%, #111830 50%, #0A0F1E 100%);
      transition: opacity 0.5s ease-out;
    }
    .loading-screen.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    /* ── SVG Eye ── */
    .eye-svg-wrap {
      width: 120px;
      height: 65px;
      margin-bottom: 36px;
      filter: drop-shadow(0 0 20px rgba(0,212,200,0.12));
    }
    @media (min-width: 900px) {
      .eye-svg-wrap {
        width: 180px;
        height: 95px;
      }
    }

    .eye-svg {
      width: 100%;
      height: 100%;
      overflow: visible;
    }

    /* Blink: whole eye scaleY to 0 and back — matching the Flutter blinkFactor */
    .eye-blink-group {
      transform-origin: 100px 50px;
      animation: eye-blink 4s ease-in-out infinite;
    }

    /* Iris look-around: translateX matching Flutter's irisXOffset logic
       0-15%: center
       15-35%: ease to left (-28% of eyeWidth ≈ -50px on 190px)
       35-65%: ease left to right (+28% ≈ +50px)
       65-85%: ease right to center
       85-100%: center */
    .iris-group {
      animation: iris-look 4s cubic-bezier(0.45,0.05,0.55,0.95) infinite;
    }

    /* Pupil breathing pulse: 1.0 → 1.15 → 1.0 over 2s */
    .pupil-circle {
      transform-origin: center;
      animation: pupil-breathe 2s ease-in-out infinite;
    }

    /* Subtle outer glow ring */
    .eye-glow-stroke {
      animation: glow-opacity 3s ease-in-out infinite;
    }

    /* ═══ KEYFRAMES ═══ */

    /* Blink at 20%, 50%, 80% with ~7% window each side — matches blinkMarkers */
    @keyframes eye-blink {
      0%, 13%   { transform: scaleY(1); }
      17%       { transform: scaleY(1); }
      20%       { transform: scaleY(0.04); }
      23%       { transform: scaleY(1); }
      43%       { transform: scaleY(1); }
      47%       { transform: scaleY(1); }
      50%       { transform: scaleY(0.04); }
      53%       { transform: scaleY(1); }
      73%       { transform: scaleY(1); }
      77%       { transform: scaleY(1); }
      80%       { transform: scaleY(0.04); }
      83%       { transform: scaleY(1); }
      100%      { transform: scaleY(1); }
    }

    /* Iris look-around matching Flutter's irisXOffset phases */
    @keyframes iris-look {
      0%, 15%   { transform: translateX(0); }
      35%       { transform: translateX(-24px); }
      65%       { transform: translateX(24px); }
      85%, 100% { transform: translateX(0); }
    }
    @media (min-width: 900px) {
      @keyframes iris-look {
        0%, 15%   { transform: translateX(0); }
        35%       { transform: translateX(-36px); }
        65%       { transform: translateX(36px); }
        85%, 100% { transform: translateX(0); }
      }
    }

    /* Pupil breathing (sin-like) */
    @keyframes pupil-breathe {
      0%, 100%  { transform: scale(1); }
      50%       { transform: scale(1.18); }
    }

    @keyframes glow-opacity {
      0%, 100% { opacity: 0.3; }
      50%      { opacity: 0.7; }
    }

    /* ── Progress Section ── */
    .progress-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .progress-percent {
      font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
      font-size: 28px;
      font-weight: 700;
      background: linear-gradient(135deg, #00D4C8, #4F6AFF);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 1px;
    }
    @media (min-width: 900px) {
      .progress-percent { font-size: 36px; }
    }

    .progress-bar-track {
      width: 150px;
      height: 3px;
      background: rgba(255,255,255,0.06);
      border-radius: 4px;
      overflow: hidden;
    }
    @media (min-width: 900px) {
      .progress-bar-track { width: 210px; }
    }

    .progress-bar-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #00D4C8, #4F6AFF);
      border-radius: 4px;
      transition: width 0.3s ease-out;
      box-shadow: 0 0 8px rgba(0,212,200,0.4);
    }

    .progress-label {
      font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
      font-size: 11px;
      font-weight: 500;
      color: rgba(240,244,255,0.35);
      letter-spacing: 4px;
      text-transform: uppercase;
    }

    /* Brand watermark */
    .loading-brand {
      font-family: 'Syne', system-ui, sans-serif;
      font-weight: 800;
      font-size: 10px;
      letter-spacing: 6px;
      color: rgba(240,244,255,0.1);
      text-transform: uppercase;
      margin-top: 40px;
    }
  </style>
</head>
<body>
  <!-- ═══ Premium Eye Loading Screen (matches app SplashScreen) ═══ -->
  <div class="loading-screen" id="loading-screen">

    <!-- SVG Eye — faithful recreation of EyeLoader CustomPainter -->
    <div class="eye-svg-wrap">
      <svg class="eye-svg" viewBox="0 0 200 100" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <!-- Iris radial gradient (teal center → semi-transparent teal edge) -->
          <radialGradient id="irisGrad" cx="50%" cy="50%" r="50%">
            <stop offset="0%"   stop-color="#00D4C8" stop-opacity="1"/>
            <stop offset="100%" stop-color="#00D4C8" stop-opacity="0.7"/>
          </radialGradient>
          <!-- Sclera subtle gradient -->
          <radialGradient id="scleraGrad" cx="50%" cy="50%" r="60%">
            <stop offset="0%"   stop-color="#F0F4FF"/>
            <stop offset="100%" stop-color="#E0E4F0"/>
          </radialGradient>
        </defs>

        <g class="eye-blink-group">
          <!-- Sclera: almond/leaf shape via quadratic bezier — matches the Flutter path exactly -->
          <path d="M 5,50 Q 100,-5 195,50 Q 100,105 5,50 Z"
                fill="url(#scleraGrad)"/>
          <!-- Subtle teal glow stroke (matches Flutter's 0.15 alpha stroke) -->
          <path d="M 5,50 Q 100,-5 195,50 Q 100,105 5,50 Z"
                fill="none" stroke="rgba(0,212,200,0.15)" stroke-width="1.5"
                class="eye-glow-stroke"/>

          <!-- Clip to sclera shape for iris/pupil -->
          <clipPath id="scleraClip">
            <path d="M 5,50 Q 100,-5 195,50 Q 100,105 5,50 Z"/>
          </clipPath>

          <g clip-path="url(#scleraClip)">
            <!-- Iris + Pupil group (animated look-around) -->
            <g class="iris-group">
              <!-- Iris circle — radius ~26 (52% of half-width) -->
              <circle cx="100" cy="50" r="27" fill="url(#irisGrad)"/>

              <!-- Pupil — 42% of iris radius, with breathing animation -->
              <circle cx="100" cy="50" r="11" fill="#000510" class="pupil-circle"/>

              <!-- Primary reflection (top-right of iris) -->
              <circle cx="108" cy="42" r="4.3" fill="rgba(255,255,255,0.45)"/>

              <!-- Secondary reflection (bottom-left, smaller) -->
              <circle cx="94.6" cy="55.4" r="2.2" fill="rgba(255,255,255,0.2)"/>
            </g>
          </g>
        </g>
      </svg>
    </div>

    <!-- Numeric progress -->
    <div class="progress-area">
      <div class="progress-percent" id="progress-percent">0%</div>
      <div class="progress-bar-track">
        <div class="progress-bar-fill" id="progress-bar-fill"></div>
      </div>
      <div class="progress-label">Loading Experience</div>
    </div>

    <div class="loading-brand">V I S I A X X</div>
  </div>

  <!-- Forced font preload to eliminate initial flicker -->
  <div class="font-preload syne-preload">VISION OPTOCARE</div>

  <script>
    // ── Smooth progress driven by real loading events ──
    var _progress = 0;
    var _targetProgress = 0;
    var _flutterReady = false;

    function setTarget(t) {
      _targetProgress = Math.max(_targetProgress, t);
    }

    function tickProgress() {
      if (_progress < _targetProgress) {
        var step = Math.max(0.4, (_targetProgress - _progress) * 0.07);
        _progress = Math.min(_targetProgress, _progress + step);
      }
      var pct = Math.round(_progress);
      var el = document.getElementById('progress-percent');
      var bar = document.getElementById('progress-bar-fill');
      if (el) el.textContent = pct + '%';
      if (bar) bar.style.width = pct + '%';

      if (_progress >= 100 && _flutterReady) {
        var screen = document.getElementById('loading-screen');
        if (screen) {
          screen.classList.add('fade-out');
          setTimeout(function() { screen.remove(); }, 600);
        }
        return;
      }
      requestAnimationFrame(tickProgress);
    }
    requestAnimationFrame(tickProgress);

    // Progress milestones
    setTarget(12);
    setTimeout(function() { setTarget(28); }, 600);
    setTimeout(function() { setTarget(42); }, 1400);
    setTimeout(function() { setTarget(55); }, 2200);
    setTimeout(function() { setTarget(65); }, 3200);

    // Fonts loaded
    if (document.fonts) {
      document.fonts.ready.then(function() { setTarget(78); });
    }

    // Flutter first frame
    window.addEventListener('flutter-first-frame', function() {
      _flutterReady = true;
      setTarget(100);
    });

    // Safety: don't hang forever
    setTimeout(function() { setTarget(85); }, 6000);
    setTimeout(function() { setTarget(92); }, 9000);
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
