<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Visiaxx — 12 clinical-grade eye tests from your couch. Digital eye care reimagined.">
  <meta name="keywords" content="eye care, vision test, eye test online, digital eye care, visiaxx">

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Visiaxx">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Visiaxx — Vision Care, Reimagined</title>
  <link rel="manifest" href="manifest.json">

  <!-- Preconnect and Preload Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=DM+Sans:wght@400;500;700&display=block" rel="stylesheet">

  <style>
    .font-preload { position: absolute; visibility: hidden; opacity: 0; pointer-events: none; }
    .syne-preload { font-family: 'Syne'; font-weight: 800; }

    body {
      margin: 0;
      padding: 0;
      background-color: #0A0F1E;
      overflow: hidden;
    }

    /* ═══════════════════════════════════════════════════════════════
       VISIAXX EYE LOADER
       Pixel-perfect SVG recreation of the Flutter EyeLoader widget.

       Flutter source coordinates (200×200 square canvas):
         eyeWidth      = 200 * 0.95  = 190   (x: 5→195)
         baseEyeHeight = 200 * 0.52  = 104   (control-point offset)
         Bezier peak   = 100 - 52    = 48    (top), 152 (bottom)
         irisRadius    = 100 * 0.52  = 52
         pupilRadius   = 52  * 0.42  ≈ 22
         irisXOffset   = 190 * 0.28  ≈ 53    (max look distance)
         reflect1      = iris + (15.6, -15.6)  r=8.3
         reflect2      = iris + (-10.4, 10.4)  r=4.2

       viewBox crops to "0 38 200 124" showing y 38→162
       (eye visible from y=48 to y=152 with 10-unit margin)
       ═══════════════════════════════════════════════════════════════ */

    .loading-screen {
      position: fixed;
      inset: 0;
      z-index: 999999;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: linear-gradient(180deg, #0A0F1E 0%, #111830 50%, #0A0F1E 100%);
      transition: opacity 0.5s ease-out;
    }
    .loading-screen.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    /* Eye container — aspect ratio  200 : 124  ≈  1.61 : 1 */
    .eye-svg-wrap {
      width: 150px;
      aspect-ratio: 200 / 124;
      margin-bottom: 36px;
      filter: drop-shadow(0 0 18px rgba(0,212,200,0.10));
    }
    @media (min-width: 900px) {
      .eye-svg-wrap { width: 230px; }
    }

    .eye-svg {
      display: block;
      width: 100%;
      height: 100%;
      overflow: visible;
    }

    /* ── Blink animation ──
       scaleY around eye center (100, 100 in SVG coords).
       Blinks at 20%, 50%, 80% of 4s cycle (matches Flutter blinkMarkers). */
    .eye-blink-group {
      transform-origin: 100px 100px;
      animation: eye-blink 4s ease-in-out infinite;
    }

    /* ── Iris look-around ──
       translateX in SVG user-units (px on SVG elements = SVG units).
       ±53 units = ±28% of eyeWidth, matching Flutter. */
    .iris-group {
      animation: iris-look 4s cubic-bezier(0.42, 0, 0.58, 1) infinite;
    }

    /* ── Pupil breathing pulse ──
       scale 1 → 1.1 over 2s, matching Flutter's
       pulseScale = 1.0 + 0.1 * sin(progress * 2π) */
    .pupil-circle {
      transform-origin: 100px 100px;
      transform-box: view-box;
      animation: pupil-breathe 2s ease-in-out infinite;
    }

    /* ── Glow stroke pulse ── */
    .eye-glow-stroke {
      animation: glow-opacity 3s ease-in-out infinite;
    }

    /* ═══ KEYFRAMES ═══ */

    @keyframes eye-blink {
      /* Flutter: blink at markers 0.2, 0.5, 0.8 with blinkWindow=0.07
         Each blink: ramp down to scaleY(0) then back up over 14% of cycle.
         Using sin(t*π) easing via ease-in-out. */
      0%, 15%   { transform: scaleY(1); }
      18%       { transform: scaleY(1); }
      20%       { transform: scaleY(0.03); }
      22%       { transform: scaleY(1); }
      45%       { transform: scaleY(1); }
      48%       { transform: scaleY(1); }
      50%       { transform: scaleY(0.03); }
      52%       { transform: scaleY(1); }
      75%       { transform: scaleY(1); }
      78%       { transform: scaleY(1); }
      80%       { transform: scaleY(0.03); }
      82%       { transform: scaleY(1); }
      100%      { transform: scaleY(1); }
    }

    @keyframes iris-look {
      /* Flutter phases:
         0-15%:  center (0)
         15-35%: ease to left (-53)
         35-65%: ease left→right (-53 → +53)
         65-85%: ease right→center (+53 → 0)
         85-100%: center (0) */
      0%, 15%   { transform: translateX(0); }
      35%       { transform: translateX(-53px); }
      65%       { transform: translateX(53px); }
      85%, 100% { transform: translateX(0); }
    }

    @keyframes pupil-breathe {
      0%, 100%  { transform: scale(1); }
      50%       { transform: scale(1.1); }
    }

    @keyframes glow-opacity {
      0%, 100% { opacity: 0.35; }
      50%      { opacity: 0.75; }
    }

    /* ── Progress area ── */
    .progress-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .progress-percent {
      font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
      font-size: 28px;
      font-weight: 700;
      background: linear-gradient(135deg, #00D4C8, #4F6AFF);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 1px;
    }
    @media (min-width: 900px) {
      .progress-percent { font-size: 36px; }
    }

    .progress-bar-track {
      width: 150px;
      height: 3px;
      background: rgba(255,255,255,0.06);
      border-radius: 4px;
      overflow: hidden;
    }
    @media (min-width: 900px) {
      .progress-bar-track { width: 210px; }
    }

    .progress-bar-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #00D4C8, #4F6AFF);
      border-radius: 4px;
      transition: width 0.3s ease-out;
      box-shadow: 0 0 8px rgba(0,212,200,0.4);
    }

    .progress-label {
      font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
      font-size: 11px;
      font-weight: 500;
      color: rgba(240,244,255,0.35);
      letter-spacing: 4px;
      text-transform: uppercase;
    }

    .loading-brand {
      font-family: 'Syne', system-ui, sans-serif;
      font-weight: 800;
      font-size: 10px;
      letter-spacing: 6px;
      color: rgba(240,244,255,0.10);
      text-transform: uppercase;
      margin-top: 40px;
    }
  </style>
</head>
<body>
  <!-- ═══ Visiaxx Eye Loading Screen ═══ -->
  <div class="loading-screen" id="loading-screen">

    <!-- SVG Eye — mathematically identical to Flutter EyeLoader CustomPainter -->
    <div class="eye-svg-wrap">
      <!--
        viewBox "0 38 200 124" crops to the visible eye area:
        eye top ≈ y48, bottom ≈ y152, with 10-unit padding.
        All coordinates are in the original 200×200 space.
      -->
      <svg class="eye-svg" viewBox="0 38 200 124" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <!-- Iris: radial gradient from solid teal → 70% alpha teal
               (matches Flutter RadialGradient [alpha:1.0, alpha:0.7]) -->
          <radialGradient id="iG" cx="50%" cy="50%" r="50%">
            <stop offset="0%"   stop-color="#00D4C8" stop-opacity="1"/>
            <stop offset="100%" stop-color="#00D4C8" stop-opacity="0.7"/>
          </radialGradient>

          <!-- Sclera: subtle white gradient -->
          <radialGradient id="sG" cx="50%" cy="50%" r="60%">
            <stop offset="0%"   stop-color="#F0F4FF"/>
            <stop offset="100%" stop-color="#E4E8F4"/>
          </radialGradient>

          <!-- Clip path matching the sclera almond shape -->
          <clipPath id="sC">
            <path d="M 5,100 Q 100,-4 195,100 Q 100,204 5,100 Z"/>
          </clipPath>
        </defs>

        <g class="eye-blink-group">
          <!-- Sclera: almond/leaf shape
               Flutter path: moveTo(5,100) quadBezTo(100,-4, 195,100)
                              quadBezTo(100,204, 5,100)
               Control points -4 and 204 = center ± baseEyeHeight(104) -->
          <path d="M 5,100 Q 100,-4 195,100 Q 100,204 5,100 Z"
                fill="url(#sG)"/>

          <!-- Glow stroke: teal at 15% alpha, 1.5px -->
          <path d="M 5,100 Q 100,-4 195,100 Q 100,204 5,100 Z"
                fill="none" stroke="rgba(0,212,200,0.15)" stroke-width="1.5"
                class="eye-glow-stroke"/>

          <!-- Clipped internals: iris, pupil, reflections -->
          <g clip-path="url(#sC)">
            <g class="iris-group">
              <!-- Iris: circle at center, radius=52
                   (size.width/2 * 0.52 = 100*0.52) -->
              <circle cx="100" cy="100" r="52" fill="url(#iG)"/>

              <!-- Pupil: radius = 52*0.42 ≈ 21.8
                   (breathing animation applied via CSS) -->
              <circle cx="100" cy="100" r="22" fill="#000510"
                      class="pupil-circle"/>

              <!-- Reflection 1: offset (+15.6, -15.6), r=8.3
                   = irisRadius * (0.3, -0.3), irisRadius*0.16 -->
              <circle cx="115.6" cy="84.4" r="8.3"
                      fill="rgba(255,255,255,0.45)"/>

              <!-- Reflection 2: offset (-10.4, +10.4), r=4.2
                   = irisRadius * (-0.2, 0.2), irisRadius*0.08 -->
              <circle cx="89.6" cy="110.4" r="4.2"
                      fill="rgba(255,255,255,0.20)"/>
            </g>
          </g>
        </g>
      </svg>
    </div>

    <!-- Numeric progress -->
    <div class="progress-area">
      <div class="progress-percent" id="progress-percent">0%</div>
      <div class="progress-bar-track">
        <div class="progress-bar-fill" id="progress-bar-fill"></div>
      </div>
      <div class="progress-label">Loading Experience</div>
    </div>

    <div class="loading-brand">V I S I A X X</div>
  </div>

  <!-- Forced font preload -->
  <div class="font-preload syne-preload">VISION OPTOCARE</div>

  <script>
    // ── Smooth progress driven by real loading events ──
    var _progress = 0;
    var _targetProgress = 0;
    var _flutterReady = false;

    function setTarget(t) {
      _targetProgress = Math.max(_targetProgress, t);
    }

    function tickProgress() {
      if (_progress < _targetProgress) {
        var step = Math.max(0.4, (_targetProgress - _progress) * 0.07);
        _progress = Math.min(_targetProgress, _progress + step);
      }
      var pct = Math.round(_progress);
      var el = document.getElementById('progress-percent');
      var bar = document.getElementById('progress-bar-fill');
      if (el) el.textContent = pct + '%';
      if (bar) bar.style.width = pct + '%';

      if (_progress >= 100 && _flutterReady) {
        var screen = document.getElementById('loading-screen');
        if (screen) {
          screen.classList.add('fade-out');
          setTimeout(function() { screen.remove(); }, 600);
        }
        return;
      }
      requestAnimationFrame(tickProgress);
    }
    requestAnimationFrame(tickProgress);

    // Progress milestones
    setTarget(12);
    setTimeout(function() { setTarget(28); }, 600);
    setTimeout(function() { setTarget(42); }, 1400);
    setTimeout(function() { setTarget(55); }, 2200);
    setTimeout(function() { setTarget(65); }, 3200);

    // Fonts loaded
    if (document.fonts) {
      document.fonts.ready.then(function() { setTarget(78); });
    }

    // Flutter first frame
    window.addEventListener('flutter-first-frame', function() {
      _flutterReady = true;
      setTarget(100);
    });

    // Safety valve
    setTimeout(function() { setTarget(85); }, 6000);
    setTimeout(function() { setTarget(92); }, 9000);
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
